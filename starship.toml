# ─────────────────────────────────────────────────────────────
#  Starship Prompt — Monero Theme
#  Style: ~ > Downloads > ISO ❯
# ─────────────────────────────────────────────────────────────

format = "$directory$git_branch$git_status$cmd_duration\n❯ "

# ── Directory ─────────────────────────────────────────────────
[directory]
style = "bold fg:#ff6600"
format = "[$path ]($style)"
truncation_length = 5
truncation_symbol = "…> "
home_symbol = "~"
use_logical_path = true

[directory.substitutions]
"/" = " > "

# ── Git branch ────────────────────────────────────────────────
[git_branch]
style = "fg:#4C4C4C"
symbol = ""
format = "[on $branch]($style)"

# ── Git status ────────────────────────────────────────────────
[git_status]
style = "fg:#ff6600"
format = '([$all_status$ahead_behind]($style))'

# ── Character (the ❯ is in format above, disable this) ────────
[character]
success_symbol = ""
error_symbol = "[❯](bold red)"
vimcmd_symbol = ""

# ── Command duration ──────────────────────────────────────────
[cmd_duration]
style = "fg:#4C4C4C"
format = "[took $duration]($style)"
min_time = 2_000

[time]
disabled = true
