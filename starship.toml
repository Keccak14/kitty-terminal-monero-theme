# ─────────────────────────────────────────────────────────────
#  Starship Prompt — Monero Theme
#  Style: [orange bg, black text path] then grey ❯
# ─────────────────────────────────────────────────────────────

format = "$directory$git_branch$git_status$cmd_duration\n[❯](bold fg:#4C4C4C) "

# ── Directory ─────────────────────────────────────────────────
[directory]
style = "bold bg:#ff6600 fg:#000000"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "…> "
home_symbol = "~"

[directory.substitutions]
"/" = " > "

# ── Git branch ────────────────────────────────────────────────
[git_branch]
style = "fg:#4C4C4C"
symbol = ""
format = "[ on $branch]($style)"

# ── Git status ────────────────────────────────────────────────
[git_status]
style = "fg:#4C4C4C"
format = '([$all_status$ahead_behind]($style))'

# ── Character ─────────────────────────────────────────────────
[character]
success_symbol = ""
error_symbol = "[❯](bold red)"
vimcmd_symbol = ""

# ── Command duration ──────────────────────────────────────────
[cmd_duration]
style = "fg:#4C4C4C"
format = " [took $duration]($style)"
min_time = 2_000

[time]
disabled = true
