format = "$directory$git_branch$git_status$cmd_duration\n[❯](bold fg:#ff6600) "

[directory]
style = "bold bg:#ff6600 fg:#000000"
format = "[ $path ](bold bg:#ff6600 fg:#000000)[](fg:#ff6600 bg:black)"
truncation_length = 5
truncation_symbol = "…/"
home_symbol = "~"

[directory.substitutions]
"/" = " > "

[git_branch]
style = "fg:#ff6600"
symbol = " "
format = "[ on $branch]($style)"

[git_status]
style = "fg:#ff6600"
format = '([$all_status$ahead_behind]($style))'

[character]
success_symbol = ""
error_symbol = "[❯](bold red)"
vimcmd_symbol = ""

[cmd_duration]
style = "fg:#4C4C4C bold"
format = " [took $duration]($style)"
min_time = 2_000

[time]
disabled = true
